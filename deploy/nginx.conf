# =============================================================================
# Project Aegis — Nginx Reverse Proxy for Streamlit
# =============================================================================
# Place at: /etc/nginx/sites-available/aegis
# Symlink:  ln -s /etc/nginx/sites-available/aegis /etc/nginx/sites-enabled/
# Test:     nginx -t && systemctl reload nginx
# =============================================================================

# Rate limiting zone — 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=aegis_limit:10m rate=10r/s;

server {
    listen 80;
    server_name aegis-terminal.com www.aegis-terminal.com;

    # Cloudflare handles SSL, so port 80 is fine behind their proxy
    # If not using Cloudflare, uncomment the redirect below:
    # return 301 https://$host$request_uri;

    # Rate limiting
    limit_req zone=aegis_limit burst=20 nodelay;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Streamlit app
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (CRITICAL for Streamlit)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-running scans
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Streamlit WebSocket endpoint
    location /_stcore/stream {
        proxy_pass http://127.0.0.1:8501/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;  # Keep WebSocket alive for 24h
    }

    # Health check endpoint (for monitoring)
    location /_stcore/health {
        proxy_pass http://127.0.0.1:8501/_stcore/health;
        access_log off;
    }
}
