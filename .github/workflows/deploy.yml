# =============================================================================
# Project Aegis — CI/CD Pipeline
# =============================================================================
# Triggers on push to main: Lint → Test → Build Docker → Deploy to VPS
# =============================================================================

name: Deploy Aegis Terminal

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: aegis-terminal
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Lint & Type Check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check src/ dashboard/ --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check src/ dashboard/

  # ---------------------------------------------------------------------------
  # Stage 2: Tests
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Smoke test — imports
        run: |
          python -c "from src.config import PROJECT_ROOT; print(f'Config OK: {PROJECT_ROOT}')"
          python -c "from src.market_scanner import MarketScanner; print('Scanner OK')"
          python -c "from src.news_researcher import NewsResearcher; print('News OK')"
          python -c "from src.auto_trader import AutoTrader; print('AutoTrader OK')"
          python -c "from src.risk_manager import RiskManager; print('RiskManager OK')"
          python -c "from src.portfolio_optimizer import PortfolioOptimizer; print('Optimizer OK')"
        env:
          PYTHONPATH: ${{ github.workspace }}

  # ---------------------------------------------------------------------------
  # Stage 3: Build & Push Docker Image
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Stage 4: Deploy to VPS
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/aegis

            # Pull latest image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Restart with new image
            docker compose pull aegis
            docker compose up -d aegis

            # Verify health
            sleep 15
            curl -f http://localhost:8501/_stcore/health || exit 1

            # Clean up old images
            docker image prune -f
